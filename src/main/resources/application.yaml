spring:
  application:
    name: inventory-manager

  # Configuração do Banco de Dados PostgreSQL
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/inventorymanager
    username: postgres
    password: 1234

  # Configuração do JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

